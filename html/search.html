 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="../css/home.css" rel="stylesheet" />
 </head>
 <body>
    <div class="Container">
         <!-- SEARCH -->
    <form class="search-box" id="form">
        <input type="text" id="search" placeholder="Enter city..." />
    </form>

    <!-- MAIN WEATHER -->
    <div class="main-weather">
        <div class="temp-widget">
        <div class="temp" id="temp">--°C</div>
        <div class="city" id="city">Search a city</div>
        </div>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="Wind">
            <h4>Wind</h4>
            <p id="wind">--</p>
        </div>
        <div class="Pressure">
            <h4>Pressure</h4>
            <p id="pressure">--</p>
        </div>
        <div class="Humidity">
            <h4>Humidity</h4>
            <p id="humidity">--</p>
        </div>
    </div>

    <!-- EXTRA -->
    <div class="extra">
        <div class="card" id="Sunrise">
            <h4>Sunrise</h4>
            <p id="sunrise">--</p>
        </div>
        <div class="card" id="Sunset">
            <h4>Sunset</h4>
            <p id="sunset">--</p>
        </div>
    </div>
    <div class="nav">

    <a href="home.html">
        <span class="material-symbols-outlined">home</span>
    </a>

    <a href="search.html" class="active">
        <span class="material-symbols-outlined">search</span>
    </a>

</div>

</div>
   
 </body>

 <script src="../js/script.js"></script>
 </html>
